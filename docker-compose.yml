services:
  postgres:
    image: postgres:18.3-bookworm
    container_name: sera_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5438:5432"
    volumes:
      - sera_postgres_data:/var/lib/postgresql
    networks:
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-stack:
    image: redis/redis-stack:latest
    container_name: sera_redis
    restart: always
    command: >
      redis-stack-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6388:6379"
    volumes:
      - sera_redis_data:/data
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sera_qdrant
    restart: always
    env_file:
      - .env
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "6338:6333"
      - "6339:6334"
    volumes:
      - sera_qdrant_data:/qdrant/storage
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    labels:
      - "traefik.enable=true"

      # HTTP redirect
      - "traefik.http.routers.sera_qdrant.entrypoints=web"
      - "traefik.http.routers.sera_qdrant.rule=Host(`qdrant.ghoniem.online`)"
      - "traefik.http.routers.sera_qdrant.middlewares=redirect-to-https"

      # HTTPS
      - "traefik.http.routers.sera_qdrant_secure.entrypoints=websecure"
      - "traefik.http.routers.sera_qdrant_secure.rule=Host(`qdrant.ghoniem.online`)"
      - "traefik.http.routers.sera_qdrant_secure.tls=true"
      - "traefik.http.routers.sera_qdrant_secure.tls.certresolver=cloudflare"

      # internal container port
      - "traefik.http.services.sera_qdrant.loadbalancer.server.port=6333"

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: sera_api:latest
    container_name: sera_api
    restart: always
    env_file:
      - .env
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
      UV_LINK_MODE: copy

      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ALEMBIC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-stack:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 7540
      --workers 2
      --loop uvloop
      --http httptools

    ports:
      - "7540:7540"

    networks:
      - traefik

    depends_on:
      postgres:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
      qdrant:
        condition: service_healthy

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.sera_api.entrypoints=web"
      - "traefik.http.routers.sera_api.rule=Host(`sera-api.ghoniem.online`)"
      - "traefik.http.routers.sera_api.middlewares=redirect-to-https"

      - "traefik.http.routers.sera_api_secure.entrypoints=websecure"
      - "traefik.http.routers.sera_api_secure.rule=Host(`sera-api.ghoniem.online`)"
      - "traefik.http.routers.sera_api_secure.tls=true"
      - "traefik.http.routers.sera_api_secure.tls.certresolver=cloudflare"

      - "traefik.http.services.sera_api.loadbalancer.server.port=7540"

      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7540/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  sera_postgres_data:
  sera_redis_data:
  sera_qdrant_data:

networks:
  traefik:
    external: true